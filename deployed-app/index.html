<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A0033">
<title>ТЕЛЕМОРЕ — Coming Soon</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--pink:#FF00AA;--cyan:#00F0FF;--gold:#FFD700;--bg1:#1A0033;--bg2:#2D004D;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow-x:hidden;}
  body{
    font-family:'Roboto',-apple-system,sans-serif;
    background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg1) 100%);
    color:#fff;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;
    position:relative;
  }
  body::before{content:"";position:fixed;inset:0;
    background:
      radial-gradient(circle at 20% 20%,rgba(255,0,170,0.25),transparent 45%),
      radial-gradient(circle at 80% 70%,rgba(0,240,255,0.25),transparent 45%),
      radial-gradient(circle at 50% 100%,rgba(255,215,0,0.12),transparent 50%);
    pointer-events:none;z-index:0;
  }
  .container{position:relative;z-index:1;text-align:center;max-width:600px;width:100%;}
  .logo{
    font-family:'Pricedown',Impact,sans-serif;
    font-size:clamp(56px,14vw,120px);
    font-weight:900;line-height:1;letter-spacing:3px;
    background:linear-gradient(180deg,var(--pink) 0%,var(--cyan) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 30px rgba(255,0,170,0.7));
    margin-bottom:16px;
    animation:glow 3s ease-in-out infinite alternate;
  }
  @keyframes glow{
    from{filter:drop-shadow(0 0 20px rgba(255,0,170,0.6));}
    to{filter:drop-shadow(0 0 40px rgba(0,240,255,0.8));}
  }
  .tagline{
    font-size:clamp(14px,3.5vw,18px);
    font-weight:700;color:var(--cyan);letter-spacing:4px;text-transform:uppercase;
    margin-bottom:48px;opacity:0.9;
  }
  .badge{
    display:inline-block;padding:12px 32px;margin-bottom:40px;
    border:2px solid var(--gold);border-radius:999px;
    background:rgba(255,215,0,0.08);color:var(--gold);
    font-size:14px;font-weight:900;letter-spacing:3px;
    box-shadow:0 0 30px rgba(255,215,0,0.4);
  }
  .mission{
    font-size:clamp(22px,5vw,36px);font-weight:900;color:#fff;
    margin-bottom:48px;letter-spacing:1px;line-height:1.25;
  }
  .timer{
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:12px;max-width:480px;margin:0 auto 48px;
  }
  .cell{
    padding:16px 8px;border-radius:14px;
    background:rgba(255,255,255,0.05);border:1px solid rgba(0,240,255,0.3);
    box-shadow:0 0 20px rgba(0,240,255,0.2) inset;
  }
  .num{
    font-family:'Pricedown',Impact,sans-serif;
    font-size:clamp(28px,8vw,48px);color:var(--gold);
    font-weight:900;line-height:1;
    text-shadow:0 0 20px rgba(255,215,0,0.7);
  }
  .lbl{
    font-size:10px;font-weight:700;letter-spacing:2px;
    color:rgba(255,255,255,0.6);text-transform:uppercase;margin-top:6px;
  }
  .info{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:480px;margin:0 auto 32px;
  }
  .card{
    padding:20px 12px;border-radius:14px;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,0,170,0.3);
  }
  .card .k{font-size:11px;letter-spacing:2px;color:var(--pink);font-weight:700;margin-bottom:6px;}
  .card .v{font-size:18px;font-weight:900;color:#fff;}
  .footer{
    font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:1.5px;
    margin-top:32px;
  }
  .footer a{color:var(--cyan);text-decoration:none;}
  .palm{position:absolute;font-size:48px;opacity:0.15;pointer-events:none;}
  .palm.l{top:10%;left:5%;transform:rotate(-15deg);}
  .palm.r{top:10%;right:5%;transform:rotate(15deg);}
  .palm.bl{bottom:8%;left:3%;transform:rotate(20deg);}
  .palm.br{bottom:8%;right:3%;transform:rotate(-20deg);}
  @media (max-width:420px){
    .info{grid-template-columns:1fr;}
    .palm{display:none;}
  }
</style>
</head>
<body>
<div class="palm l">🌴</div><div class="palm r">🌴</div>
<div class="palm bl">🌴</div><div class="palm br">🌴</div>
<div class="container">
  <div class="badge">⚡ COMING SOON ⚡</div>
  <h1 class="logo">TELEMORE</h1>
  <div class="tagline">Миссия Телеморе 2026</div>
  <div class="mission">Приложение запускается<br>в июне 2026</div>
  <div class="timer" id="timer">
    <div class="cell"><div class="num" id="d">00</div><div class="lbl">Дней</div></div>
    <div class="cell"><div class="num" id="h">00</div><div class="lbl">Часов</div></div>
    <div class="cell"><div class="num" id="m">00</div><div class="lbl">Минут</div></div>
    <div class="cell"><div class="num" id="s">00</div><div class="lbl">Секунд</div></div>
  </div>
  <div class="info">
    <div class="card"><div class="k">УЧАСТНИКОВ</div><div class="v">60</div></div>
    <div class="card"><div class="k">ДНЕЙ ТУРА</div><div class="v">13</div></div>
  </div>
  <div class="footer">
    Готовим миссию...<br>
    <a href="https://t.me/telemore_bot">@telemore_bot</a>
  </div>
</div>
<script>
(function(){
  try{
    const tg = window.Telegram && window.Telegram.WebApp;
    if(tg){
      tg.ready();
      tg.expand();
      tg.setHeaderColor('#1A0033');
      tg.setBackgroundColor('#1A0033');
    }
  }catch(e){}
  const target = new Date('2026-06-10T08:00:00+03:00').getTime();
  const pad = n => String(n).padStart(2,'0');
  function tick(){
    const now = Date.now();
    let diff = Math.max(0, target - now);
    const d = Math.floor(diff / 86400000); diff -= d*86400000;
    const h = Math.floor(diff / 3600000);  diff -= h*3600000;
    const m = Math.floor(diff / 60000);    diff -= m*60000;
    const s = Math.floor(diff / 1000);
    document.getElementById('d').textContent = pad(d);
    document.getElementById('h').textContent = pad(h);
    document.getElementById('m').textContent = pad(m);
    document.getElementById('s').textContent = pad(s);
  }
  tick(); setInterval(tick, 1000);
})();
</script>
</body>
</html>
